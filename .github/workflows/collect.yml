name: collect-and-deploy

on:
  schedule:
    - cron: "*/30 * * * *"   # 30分毎に自動収集（UTC基準・多少の遅延あり）
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Collect news and build site
        run: python3 collector.py

      - name: Commit updated data
        run: |
          git config user.name "kakuto-lion-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/items.json
          if ! git diff --cached --quiet; then
            git commit -m "auto: update news data"
            git pull --rebase origin main
            git push
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
