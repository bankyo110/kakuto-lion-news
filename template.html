<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="600">
<title>格闘ライオンNEWS — 格闘技速報タイムライン</title>
<style>
:root{--bg:#000;--panel:#16181c;--border:#2f3336;--text:#e7e9ea;--dim:#71767b;--accent:#f7b731;--blue:#1d9bf0;
--c-breaking:#f4212e;--c-result:#f7b731;--c-rumor:#a06bf0;--c-info:#1d9bf0;--c-news:#71767b}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.5}
.wrap{max-width:620px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);min-height:100vh}
header{position:sticky;top:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:10}
.brand{display:flex;align-items:center;gap:10px;padding:12px 16px}
.brand .logo{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#f7b731,#e8590c);display:flex;align-items:center;justify-content:center;font-size:19px}
.brand h1{font-size:17px;font-weight:800}
.brand .upd{margin-left:auto;font-size:11px;color:var(--dim)}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:11px 16px;font-size:14px;font-weight:700;color:var(--dim);cursor:pointer;position:relative;background:none;border:none;white-space:nowrap}
.tab.active{color:var(--text)}
.tab.active::after{content:"";position:absolute;bottom:0;left:16px;right:16px;height:4px;border-radius:2px;background:var(--accent)}
.searchbox{padding:8px 16px 12px}
.searchbox input{width:100%;background:#202327;border:1px solid transparent;border-radius:999px;padding:9px 16px;color:var(--text);font-size:14px;outline:none}
.searchbox input:focus{border-color:var(--accent);background:#000}
.post{display:flex;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.post:hover{background:#080808}
.avatar{flex:none;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff}
.meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:13.5px}
.meta .src{font-weight:800}
.meta .dim{color:var(--dim)}
.chip{font-size:11px;font-weight:700;padding:1.5px 8px;border-radius:999px;color:#000}
.title{font-size:15px;margin-top:2px;word-break:break-word}
.desc{font-size:13px;color:var(--dim);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.actions{display:flex;gap:48px;margin-top:8px;color:var(--dim);font-size:12.5px}
.actions span:hover{color:var(--accent)}
.empty{padding:60px 20px;text-align:center;color:var(--dim)}
footer{padding:24px 16px;text-align:center;color:var(--dim);font-size:12px;border-top:1px solid var(--border)}
@media(max-width:640px){.wrap{border:none}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="brand">
    <div class="logo">🦁</div>
    <h1>格闘ライオンNEWS</h1>
    <span class="upd">更新 __UPDATED__ JST</span>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-f="all">すべて</button>
    <button class="tab" data-f="breaking_result">速報・結果</button>
    <button class="tab" data-f="info">試合情報</button>
    <button class="tab" data-f="rumor">噂・話題</button>
    <button class="tab" data-f="boxing">ボクシング</button>
    <button class="tab" data-f="mma">MMA</button>
  </nav>
  <div class="searchbox"><input id="q" type="search" placeholder="選手名・大会名で検索（井上尚弥 / RIZIN / UFC…）"></div>
</header>
<main id="feed"></main>
<footer>格闘ライオンNEWS — 自動収集タイムライン（RSS: ボクシングニュース / MMAPLANET / ゴング格闘技 / バトル・ニュース / Google News）<br>各記事の著作権は配信元に帰属します。タイトル・リンクのみ掲載。</footer>
</div>
<script>
const DATA = __DATA__;
const CAT = {breaking:["速報","--c-breaking"],result:["試合結果","--c-result"],rumor:["噂・話題","--c-rumor"],info:["試合情報","--c-info"],news:["ニュース","--c-news"]};
const COLORS=["#e8590c","#1d9bf0","#a06bf0","#2ea043","#f7b731","#f4212e","#0ca678","#d6336c"];
function color(s){let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))>>>0;return COLORS[h%COLORS.length]}
function ago(iso){const d=(Date.now()-new Date(iso))/1000;
 if(d<3600)return Math.max(1,Math.floor(d/60))+"分前";
 if(d<86400)return Math.floor(d/3600)+"時間前";
 if(d<86400*7)return Math.floor(d/86400)+"日前";
 return new Date(iso).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"})}
let filter="all",query="";
function match(i){
 if(query&&!(i.title+i.source+i.desc).toLowerCase().includes(query))return false;
 if(filter==="all")return true;
 if(filter==="breaking_result")return i.cat==="breaking"||i.cat==="result";
 if(filter==="boxing"||filter==="mma")return i.genre===filter;
 return i.cat===filter}
function render(){
 const feed=document.getElementById("feed");
 const items=DATA.filter(match).slice(0,200);
 if(!items.length){feed.innerHTML='<div class="empty">該当するニュースがありません</div>';return}
 feed.innerHTML=items.map(i=>{
  const[label,cvar]=CAT[i.cat]||CAT.news;
  return`<article class="post" onclick="window.open('${i.link.replace(/'/g,"")}','_blank','noopener')">
   <div class="avatar" style="background:${color(i.source)}">${i.source.replace(/^GoogleNews:/,"").slice(0,1)}</div>
   <div style="min-width:0;flex:1">
    <div class="meta"><span class="src">${esc(i.source)}</span><span class="dim">· ${ago(i.ts)}</span>
     <span class="chip" style="background:var(${cvar})">${label}</span></div>
    <div class="title">${esc(i.title)}</div>
    ${i.desc?`<div class="desc">${esc(i.desc)}</div>`:""}
    <div class="actions"><span>💬</span><span>🔁</span><span>🤍</span><span>↗ 元記事</span></div>
   </div></article>`}).join("")}
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
document.getElementById("tabs").addEventListener("click",e=>{
 const t=e.target.closest(".tab");if(!t)return;
 document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
 t.classList.add("active");filter=t.dataset.f;render()});
document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render()});
render();
</script>
</body>
</html>
